<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- 
      ========================================================================
      1. BASIC CHARACTER ENCODING & VIEWPORT SCALING
      ========================================================================
      - UTF-8 ensures all special character glyphs and symbols render correctly.
      - viewport setting is mandatory for mobile-responsive layout scaling. It prevents 
        mobile browsers from simulating a desktop screen, passing Lighthouse audit criteria.
    -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    
    <!-- 
      ========================================================================
      2. LIGHTHOUSE PERFORMANCE CRITICAL OPTIMIZATIONS (FIXES ENGINE BLOCKING)
      ========================================================================
      - Preconnect establishes handshake connections early to foreign asset servers.
        This cuts out dns-lookup and tcp-connect latency steps ahead of time.
      - Non-blocking styles loading via media swapping ("print" -> "all"):
        This ensures external assets don't block the critical rendering path.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Asynchronous Font Loading Pattern (Prevents the bottleneck in image_27cb02.png) -->
    <link 
      rel="stylesheet" 
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" 
      media="print" 
      onload="this.media='all'" 
    />
    
    <!-- Google Analytics 4 (GA4) Optimized via Defer -->
    <link rel="preconnect" href="https://www.googletagmanager.com" />
    <!-- Notice 'async' is changed to 'defer' below -->
    <script defer src="https://www.googletagmanager.com/gtag/js?id=G-4FWBGFJP5J"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-4FWBGFJP5J', {
        'send_page_view': true
      });
    </script>
    <!-- 
      ========================================================================
      3. CORE APP SHELL ASSETS & PROGRESSIVE WEB APP (PWA) REQUIREMENTS
      ========================================================================
      - link rel="icon": The shortcut icon displayed inside web browser tabs.
      - link rel="apple-touch-icon": The icon used by iOS/Safari devices if a user bookmarks the site.
      - manifest.json: A mandatory configuration file that tells mobile devices and Chromium browsers 
        how your site should behave if installed as a standalone Progressive Web App (PWA).
    -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- 
      ========================================================================
      4. GLOBAL SEARCH ENGINE OPTIMIZATION (SEO) META TAGS
      ========================================================================
      - description: The exact snippet text that appears directly under your link in Google search results.
      - robots: Directs search engines to crawl ("index") this page and follow links ("follow") on it.
      - link rel="canonical": Critical for SEO. It tells search crawlers the "master copy" URL of this page.
        This prevents ranking issues caused by duplicate tracking URLs or trailing slashes.
    -->
    <meta name="description" content="Lead Software Engineer with 12+ years building cloud-native .NET microservices on AWS and Azure. Specializing in distributed systems, Kafka, microservices architecture, and AI/LLM integrations." />
    <meta name="keywords" content="software engineer, .NET, distributed systems, Kafka, AWS, Azure, microservices, cloud architecture, Chennai" />
    <meta name="author" content="Muthukumar Ramalingam" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://muthukumarramalingam.github.io/my-portfolio/" />
    
    <!-- 
      ========================================================================
      5. OPEN GRAPH (OG) METADATA
      ========================================================================
      - WHAT IS IT? Open Graph is a protocol created by Facebook that has become the internet 
        standard for social platforms (LinkedIn, Facebook, WhatsApp, Discord).
      - WHY IS IT REQUIRED? Without OG tags, when someone shares your portfolio link on LinkedIn,
        the platform guesses what image or text to show, often breaking the layout. 
      - EFFECT: These tags force professional networks to render your portfolio as a beautiful, 
        high-click-through rich preview card containing your title, summary, and profile photo.
    -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Muthukumar Ramalingam | Lead Software Engineer" />
    <meta property="og:description" content="Lead Software Engineer specializing in .NET distributed systems, Kafka, and cloud architecture. 12 years of experience building scalable microservices." />
    <meta property="og:url" content="https://muthukumarramalingam.github.io/my-portfolio/" />
    <meta property="og:image" content="%PUBLIC_URL%/profile.jpg" />
    <meta property="og:site_name" content="Muthukumar Ramalingam - Portfolio" />
    <meta property="og:locale" content="en_IN" />
    
    <!-- 
      ========================================================================
      6. TWITTER CARD METADATA
      ========================================================================
      - WHAT IS IT? This is a proprietary metadata schema used exclusively by X (formerly Twitter).
      - WHY IS IT REQUIRED? While X can read Open Graph tags as a fallback, explicit Twitter Card tags 
        give you exact layout control over how your text and assets crop on their timeline.
      - EFFECT: Setting "summary_large_image" ensures X displays your profile image as a prominent, 
        large-banner visual asset rather than a tiny thumbnail square.
    -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Muthukumar Ramalingam | Lead Software Engineer" />
    <meta name="twitter:description" content="Lead Software Engineer specializing in .NET distributed systems, Kafka, and cloud architecture. 12 years of experience." />
    <meta name="twitter:image" content="%PUBLIC_URL%/profile.jpg" />
    
    <!-- 
      ========================================================================
      7. GOOGLE SITE VERIFICATION
      ========================================================================
      - WHAT IS IT? A unique cryptographic security token linked to your Google account.
      - WHY IS IT REQUIRED? It proves to Google that you are the verified owner of this domain.
      - EFFECT: This activates your Google Search Console dashboard, unlocking access to index status, 
        crawler errors, core web vitals, and exact search queries users use to find you.
    -->
    <meta name="google-site-verification" content="aMoCS72q5Dfcz7cJtw3WMuLWRNQAQf6Bwoly-exz_84" />
    
    <!-- THE CORE BROWSER TAB DISPLAY TEXT -->
    <title>Muthukumar Ramalingam | Lead Software Engineer - .NET Distributed Systems</title>
    
    <!-- 
      ========================================================================
      8. JSON-LD STRUCTURED DATA RICH SNIPPETS
      ========================================================================
      - WHAT IS IT? JSON-LD (JavaScript Object Notation for Linked Data) is a machine-readable 
        data format recommended by Google and the W3C.
      - WHY IS IT REQUIRED? While standard HTML meta tags are designed for humans and display layouts,
        JSON-LD explicitly structures raw factual context for AI parsers and semantic algorithms.
      - EFFECT: It explicitly maps you into the Google Knowledge Graph as a specific "Person" entity.
        By defining your "sameAs" properties (LinkedIn, GitHub) and your "knowsAbout" core competencies,
        it helps search bots directly connect your internet identity to engineering search keywords.
    -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Muthukumar Ramalingam",
      "jobTitle": "Lead Software Engineer",
      "url": "https://muthukumarramalingam.github.io/my-portfolio/",
      "image": "https://muthukumarramalingam.github.io/my-portfolio/profile.jpg",
      "description": "Lead Software Engineer with 12+ years of experience in cloud-native .NET microservices, distributed systems, and AI/LLM integrations.",
      "sameAs": [
        "https://www.linkedin.com/in/muthukumarramalingam/",
        "https://github.com/MuthuKumarRamalingam"
      ],
      "location": {
        "@type": "Place",
        "name": "Chennai, India"
      },
      "email": "muthukumar.ping@gmail.com",
      "knowsAbout": [
        ".NET Core",
        "C#",
        "Microservices",
        "Apache Kafka",
        "AWS",
        "Azure",
        "Distributed Systems",
        "Cloud Architecture",
        "React JS",
        "Azure OpenAI",
        "GitHub Copilot",
        "Cursor IDE"
      ],
      "alumniOf": {
        "@type": "EducationalOrganization",
        "name": "AVC College of Engineering"
      }
    }
    </script>
  </head>
  <body>
    <!-- Fallback message displayed only if a user has explicitly disabled JavaScript in their browser -->
    <noscript>You need to enable JavaScript to run this app.</noscript>
    
    <!-- Root target container where Webpack mounts and renders your compiled React component tree -->
    <div id="root"></div>
  </body>
</html>
